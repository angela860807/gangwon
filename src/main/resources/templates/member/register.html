<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 강원도 관광</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/favicon3.png}">
    <link rel="stylesheet" th:href="@{/reset.css}">
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/font.css}">
    <style>
        body { background-color: #f0f0f0; min-height: 100vh; }
        .wrap { min-height: 100vh; display: flex; flex-direction: column; }
        #hd { position: relative !important; background: linear-gradient(135deg,rgba(137,25,155,0.9) 0%,rgba(160,17,71,0.9) 50%,rgba(179,9,1,0.9) 100%) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important; }
        .content { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 80px 20px 60px; }
        .form_wrap { width: 100%; max-width: 600px; position: relative; }
        .join_card { background-color: #fff; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); padding: 80px 60px 50px; position: relative; margin-top: 50px; }
        .member_icon { width: 100px; height: 100px; background: linear-gradient(135deg,#89199b 0%,#a01147 50%,#b30901 100%); border-radius: 50%; position: absolute; top: -50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(137,25,155,0.4); }
        .member_icon svg { width: 55px; height: 55px; fill: #fff; }
        .sec_tit { font-size: 32px; font-weight: 700; color: #333; margin-bottom: 40px; text-align: center; }
        .ctrl_wrap { position: relative; margin-bottom: 16px; display: flex; gap: 10px; }
        .txt_ctrl { display: block; width: 100%; line-height: 56px; padding: 0 20px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; transition: all 0.3s; background-color: #fafafa; margin-bottom: 16px; }
        .ctrl_wrap .txt_ctrl { margin-bottom: 0; }
        .txt_ctrl:focus { outline: none; border-color: #89199b; background-color: #fff; box-shadow: 0 0 0 4px rgba(137,25,155,0.1); }
        .check_btn { height: 56px; background: linear-gradient(135deg,#89199b 0%,#a01147 100%); color: #fff; border: none; border-radius: 12px; padding: 0 18px; font-weight: 600; cursor: pointer; white-space: nowrap; font-size: 15px; }
        .btn_con { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .btn_ctrl { display: block; width: 100%; border-radius: 12px; line-height: 56px; text-align: center; border: none; outline: none; cursor: pointer; font-weight: 600; font-size: 16px; transition: all 0.3s; text-decoration: none; }
        .btn_ctrl.join { background: linear-gradient(135deg,#89199b 0%,#a01147 50%,#b30901 100%); color: #fff; box-shadow: 0 4px 16px rgba(137,25,155,0.3); }
        .btn_ctrl.login { background: #fff; color: #89199b; border: 2px solid #89199b; }
        .error-msg { color: #e53e3e; font-size: 14px; margin-bottom: 16px; text-align: center; }
        .avail-msg { color: #38a169; font-size: 13px; margin-top: 4px; }
        .dup-msg { color: #e53e3e; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>
<div class="wrap">
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <main class="content">
        <div class="form_wrap">
            <div class="join_card">
                <div class="member_icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <h3 class="sec_tit">회원 가입</h3>
                <p class="error-msg" th:if="${errorMsg}" th:text="${errorMsg}"></p>
                <form th:action="@{/member/register}" method="post">
                    <div class="ctrl_wrap">
                        <input type="text" name="userId" id="userId" class="txt_ctrl" placeholder="아이디" required autofocus/>
                        <button type="button" class="check_btn" onclick="checkUserId()">중복 확인</button>
                    </div>
                    <div id="userIdMsg"></div>
                    <input type="password" name="password" id="pw" class="txt_ctrl" placeholder="비밀번호" required/>
                    <input type="password" id="pw2" class="txt_ctrl" placeholder="비밀번호 확인" required/>
                    <input type="text" name="name" class="txt_ctrl" placeholder="이름" required/>
                    <input type="email" name="email" class="txt_ctrl" placeholder="이메일 주소" required/>
                    <input type="tel" name="phone" class="txt_ctrl" placeholder="전화번호"/>
                    <div class="btn_con">
                        <button type="submit" class="btn_ctrl join">회원가입</button>
                        <a th:href="@{/member/login}" class="btn_ctrl login">로그인</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</div>
<script>
function checkUserId() {
    const userId = document.getElementById('userId').value.trim();
    if (!userId) { alert('아이디를 입력하세요.'); return; }
    fetch('/member/check-userid?userId=' + encodeURIComponent(userId))
        .then(r => r.text())
        .then(result => {
            const msg = document.getElementById('userIdMsg');
            if (result === 'available') {
                msg.innerHTML = '<p class="avail-msg">사용 가능한 아이디입니다.</p>';
            } else {
                msg.innerHTML = '<p class="dup-msg">이미 사용 중인 아이디입니다.</p>';
            }
        });
}
document.querySelector('form').addEventListener('submit', function(e) {
    if (document.getElementById('pw').value !== document.getElementById('pw2').value) {
        e.preventDefault();
        alert('비밀번호가 일치하지 않습니다.');
    }
});
</script>
</body>
</html>
