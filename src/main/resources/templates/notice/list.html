<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강원도 관광 - 알림소식</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/favicon3.png}">
    <link rel="stylesheet" th:href="@{/reset.css}">
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/font.css}">
    <link rel="stylesheet" th:href="@{/sub/sub1.css}">
    <link rel="stylesheet" th:href="@{/sub/sub5.css}">
</head>
<body>
<div class="wrap">
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <main>
        <div class="notice-header">
            <div class="notice-header-content">
                <div class="notice-header-text">
                    <h2>여행하기 전 체크 필수</h2>
                    <h1>강원관광 알림소식을 확인하세요! 🔔</h1>
                </div>
                <div class="notice-breadcrumb">
                    <span>HOME > 알림소식 > 알림소식</span>
                </div>
            </div>
        </div>

        <div class="search-area">
            <form th:action="@{/notice/list}" method="get" class="search-box">
                <select name="type" class="search-select">
                    <option value="title" th:selected="${type == 'title'}">제목</option>
                    <option value="content" th:selected="${type == 'content'}">내용</option>
                    <option value="writer" th:selected="${type == 'writer'}">작성자</option>
                </select>
                <input type="text" name="keyword" class="search-input"
                       placeholder="검색어를 입력해주세요." th:value="${keyword}"/>
                <button type="submit" class="search-btn">검색</button>
            </form>
        </div>

        <div class="board-container">
            <!-- 글쓰기 버튼 (로그인 시만 표시) -->
            <div th:if="${session.loginMember != null}" style="text-align:right; margin-bottom:10px;">
                <a th:href="@{/notice/new}" class="search-btn"
                   style="display:inline-block; text-decoration:none; padding:10px 24px;">글쓰기</a>
            </div>

            <table class="board-table">
                <thead>
                    <tr>
                        <th class="col-num">번호</th>
                        <th class="col-title">제목</th>
                        <th class="col-writer">작성자</th>
                        <th class="col-date">등록일</th>
                        <th class="col-views">조회수</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${notices.empty}">
                        <td colspan="5" style="text-align:center; padding:40px;">등록된 게시글이 없습니다.</td>
                    </tr>
                    <tr th:each="notice : ${notices.content}">
                        <td th:text="${notice.id}"></td>
                        <td class="title-cell">
                            <a th:href="@{/notice/detail/{id}(id=${notice.id})}" th:text="${notice.title}"></a>
                        </td>
                        <td th:text="${notice.writer}"></td>
                        <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}"></td>
                        <td th:text="${notice.viewCount}"></td>
                    </tr>
                </tbody>
            </table>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${totalPages > 0}">
                <a th:href="@{/notice/list(page=${currentPage - 1}, keyword=${keyword}, type=${type})}"
                   class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'">&lt;</a>
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/notice/list(page=${i}, keyword=${keyword}, type=${type})}"
                       class="page-num"
                       th:classappend="${i == currentPage} ? 'active'"
                       th:text="${i + 1}"></a>
                </th:block>
                <a th:href="@{/notice/list(page=${currentPage + 1}, keyword=${keyword}, type=${type})}"
                   class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">&gt;</a>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</div>
</body>
</html>
